name: PORT_OPERATIONS_VIEW
comment: "Semantic view for Port of Toronto maritime operations covering container shipping, cargo invoicing, rail logistics, crane performance, and truck queue management on Lake Ontario."

tables:
  - name: TERMINALS
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: TERMINALS
    comment: "Reference table for port terminal facilities along Toronto's waterfront on Lake Ontario."
    dimensions:
      - name: TERMINAL_ID
        expr: TERMINAL_ID
        data_type: TEXT
        comment: "Unique identifier for each terminal facility."
      - name: TERMINAL_NAME
        expr: TERMINAL_NAME
        data_type: TEXT
        comment: "Human-readable name of the terminal."
        synonyms:
          - "dock"
          - "berth"
          - "facility"
          - "wharf"
      - name: TERMINAL_CODE
        expr: TERMINAL_CODE
        data_type: TEXT
        comment: "Short code identifying the terminal."
      - name: OPERATOR
        expr: OPERATOR
        data_type: TEXT
        comment: "Company or entity operating the terminal."
        synonyms:
          - "terminal operator"
          - "port operator"
    facts:
      - name: MAX_TEU_CAPACITY
        expr: MAX_TEU_CAPACITY
        data_type: NUMBER
        comment: "Maximum TEU capacity of the terminal."
      - name: NUM_BERTHS
        expr: NUM_BERTHS
        data_type: NUMBER
        comment: "Number of vessel berths available at the terminal."
      - name: NUM_CRANES
        expr: NUM_CRANES
        data_type: NUMBER
        comment: "Number of cranes installed at the terminal."
      - name: LATITUDE
        expr: LATITUDE
        data_type: NUMBER
        comment: "Geographic latitude of the terminal."
      - name: LONGITUDE
        expr: LONGITUDE
        data_type: NUMBER
        comment: "Geographic longitude of the terminal."

  - name: VESSELS
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: VESSELS
    comment: "Reference table for vessels that call at the Port of Toronto."
    dimensions:
      - name: VESSEL_ID
        expr: VESSEL_ID
        data_type: TEXT
        comment: "Unique identifier for each vessel."
      - name: VESSEL_NAME
        expr: VESSEL_NAME
        data_type: TEXT
        comment: "Name of the vessel."
        synonyms:
          - "ship name"
          - "boat name"
      - name: SHIPPING_LINE
        expr: SHIPPING_LINE
        data_type: TEXT
        comment: "Shipping company operating the vessel."
        synonyms:
          - "carrier"
          - "shipping company"
          - "operator"
          - "liner"
      - name: VESSEL_TYPE
        expr: VESSEL_TYPE
        data_type: TEXT
        comment: "Type of vessel."
        synonyms:
          - "ship type"
          - "boat type"
      - name: FLAG_STATE
        expr: FLAG_STATE
        data_type: TEXT
        comment: "Country of vessel registration."
        synonyms:
          - "flag"
          - "registry"
          - "country of registration"
    facts:
      - name: MAX_TEU
        expr: MAX_TEU
        data_type: NUMBER
        comment: "Maximum TEU capacity of the vessel."
      - name: IMO_NUMBER
        expr: IMO_NUMBER
        data_type: NUMBER
        comment: "International Maritime Organization vessel number."
      - name: YEAR_BUILT
        expr: YEAR_BUILT
        data_type: NUMBER
        comment: "Year the vessel was built."

  - name: CONTAINER_MANIFESTS
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: CONTAINER_MANIFESTS
    comment: "Shipping manifests for container cargo arriving at the Port of Toronto."
    dimensions:
      - name: MANIFEST_ID
        expr: MANIFEST_ID
        data_type: TEXT
        comment: "Unique identifier for each container manifest."
      - name: VESSEL_ID
        expr: VESSEL_ID
        data_type: TEXT
        comment: "Foreign key to the VESSELS table."
      - name: VOYAGE_NUMBER
        expr: VOYAGE_NUMBER
        data_type: TEXT
        comment: "Voyage number for the shipping route."
      - name: BILL_OF_LADING_NUMBER
        expr: BILL_OF_LADING_NUMBER
        data_type: TEXT
        comment: "Bill of lading document number."
        synonyms:
          - "BOL"
          - "B/L"
          - "bill of lading"
      - name: ORIGIN_PORT
        expr: ORIGIN_PORT
        data_type: TEXT
        comment: "Port where the cargo originated."
        synonyms:
          - "source port"
          - "departure port"
          - "port of origin"
      - name: DESTINATION_TERMINAL
        expr: DESTINATION_TERMINAL
        data_type: TEXT
        comment: "Terminal ID where cargo is destined."
      - name: CARGO_CATEGORY
        expr: CARGO_CATEGORY
        data_type: TEXT
        comment: "Category of cargo being shipped."
        synonyms:
          - "goods type"
          - "cargo type"
          - "commodity category"
          - "product category"
      - name: CBSA_DECLARATION_STATUS
        expr: CBSA_DECLARATION_STATUS
        data_type: TEXT
        comment: "Canada Border Services Agency customs declaration status."
        synonyms:
          - "customs status"
          - "CBSA status"
          - "border status"
          - "declaration status"
      - name: ARRIVAL_DATE
        expr: ARRIVAL_DATE
        data_type: DATE
        comment: "Date the vessel arrived at port with this manifest."
        synonyms:
          - "date arrived"
          - "arrival"
          - "ship date"
    facts:
      - name: CONTAINER_COUNT
        expr: CONTAINER_COUNT
        data_type: NUMBER
        comment: "Number of containers in this manifest shipment."
      - name: TEU_COUNT
        expr: TEU_COUNT
        data_type: NUMBER
        comment: "Twenty-foot Equivalent Units."
        synonyms:
          - "TEUs"
          - "container units"
      - name: WEIGHT_TONNES
        expr: WEIGHT_TONNES
        data_type: NUMBER
        comment: "Total weight in metric tonnes."
        synonyms:
          - "weight"
          - "tonnage"
          - "cargo weight"
      - name: DECLARED_VALUE_CAD
        expr: DECLARED_VALUE_CAD
        data_type: NUMBER
        comment: "Declared customs value in Canadian dollars."
        synonyms:
          - "cargo value"
          - "declared value"
          - "shipment value"
      - name: ESTIMATED_BERTH_TIME_HOURS
        expr: ESTIMATED_BERTH_TIME_HOURS
        data_type: NUMBER
        comment: "Estimated berth time in hours."
      - name: ACTUAL_BERTH_TIME_HOURS
        expr: ACTUAL_BERTH_TIME_HOURS
        data_type: NUMBER
        comment: "Actual berth time in hours."

  - name: CARGO_INVOICES
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: CARGO_INVOICES
    comment: "Commercial invoices for cargo shipments processed through the port."
    dimensions:
      - name: INVOICE_ID
        expr: INVOICE_ID
        data_type: TEXT
        comment: "Unique identifier for each cargo invoice."
      - name: MANIFEST_ID
        expr: MANIFEST_ID
        data_type: TEXT
        comment: "Foreign key to CONTAINER_MANIFESTS table."
      - name: SHIPPER_NAME
        expr: SHIPPER_NAME
        data_type: TEXT
        comment: "Name of the shipper/exporter."
        synonyms:
          - "exporter"
          - "sender"
      - name: CONSIGNEE_NAME
        expr: CONSIGNEE_NAME
        data_type: TEXT
        comment: "Name of the consignee/importer."
        synonyms:
          - "importer"
          - "receiver"
          - "buyer"
      - name: CONSIGNEE_CITY
        expr: CONSIGNEE_CITY
        data_type: TEXT
        comment: "City where the consignee is located."
      - name: COMMODITY_DESCRIPTION
        expr: COMMODITY_DESCRIPTION
        data_type: TEXT
        comment: "Description of the commodity."
        synonyms:
          - "product"
          - "goods"
          - "item description"
      - name: CURRENCY_ORIGINAL
        expr: CURRENCY_ORIGINAL
        data_type: TEXT
        comment: "Original currency of the invoice."
      - name: PAYMENT_TERMS
        expr: PAYMENT_TERMS
        data_type: TEXT
        comment: "Payment terms for the invoice."
      - name: INVOICE_DATE
        expr: INVOICE_DATE
        data_type: DATE
        comment: "Date the invoice was issued."
        synonyms:
          - "billing date"
          - "date invoiced"
    facts:
      - name: QUANTITY
        expr: QUANTITY
        data_type: NUMBER
        comment: "Quantity of goods on the invoice."
      - name: UNIT_PRICE_CAD
        expr: UNIT_PRICE_CAD
        data_type: NUMBER
        comment: "Unit price in Canadian dollars."
      - name: TOTAL_VALUE_CAD
        expr: TOTAL_VALUE_CAD
        data_type: NUMBER
        comment: "Total invoice value in Canadian dollars."
        synonyms:
          - "invoice amount"
          - "invoice value"
          - "trade value"
      - name: EXCHANGE_RATE
        expr: EXCHANGE_RATE
        data_type: NUMBER
        comment: "Exchange rate from original currency to CAD."
      - name: COMMODITY_HS_CODE
        expr: COMMODITY_HS_CODE
        data_type: NUMBER
        comment: "Harmonized System code for the commodity."

  - name: RAIL_SCHEDULES
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: RAIL_SCHEDULES
    comment: "Rail departure schedules from port terminals to inland destinations."
    dimensions:
      - name: SCHEDULE_ID
        expr: SCHEDULE_ID
        data_type: TEXT
        comment: "Unique identifier for each rail schedule entry."
      - name: RAILWAY
        expr: RAILWAY
        data_type: TEXT
        comment: "Railway company (e.g. CN, CP)."
        synonyms:
          - "rail company"
          - "railroad"
          - "rail operator"
      - name: TRAIN_NUMBER
        expr: TRAIN_NUMBER
        data_type: TEXT
        comment: "Train identification number."
      - name: ORIGIN_TERMINAL
        expr: ORIGIN_TERMINAL
        data_type: TEXT
        comment: "Terminal ID where the train departs from."
      - name: DESTINATION_CITY
        expr: DESTINATION_CITY
        data_type: TEXT
        comment: "Inland city destination."
        synonyms:
          - "destination"
          - "city"
      - name: CARGO_TYPE
        expr: CARGO_TYPE
        data_type: TEXT
        comment: "Type of cargo transported by rail."
        synonyms:
          - "freight type"
          - "goods type"
      - name: STATUS
        expr: STATUS
        data_type: TEXT
        comment: "Current status of the rail schedule."
        synonyms:
          - "train status"
          - "rail status"
      - name: DELAY_REASON
        expr: DELAY_REASON
        data_type: TEXT
        comment: "Reason for delay if not on schedule."
      - name: DEPARTURE_DATETIME
        expr: DEPARTURE_DATETIME
        data_type: TIMESTAMP_NTZ
        comment: "Scheduled departure date and time."
        synonyms:
          - "departure time"
          - "departs"
      - name: ESTIMATED_ARRIVAL_DATETIME
        expr: ESTIMATED_ARRIVAL_DATETIME
        data_type: TIMESTAMP_NTZ
        comment: "Estimated arrival date and time."
      - name: ACTUAL_ARRIVAL_DATETIME
        expr: ACTUAL_ARRIVAL_DATETIME
        data_type: TIMESTAMP_NTZ
        comment: "Actual arrival date and time."
    facts:
      - name: NUM_CONTAINERS
        expr: NUM_CONTAINERS
        data_type: NUMBER
        comment: "Number of containers loaded on the train."
      - name: NUM_RAIL_CARS
        expr: NUM_RAIL_CARS
        data_type: NUMBER
        comment: "Number of rail cars in the consist."

  - name: CRANE_UTILIZATION
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: CRANE_UTILIZATION
    comment: "Time-series operational metrics for port cranes."
    dimensions:
      - name: METRIC_ID
        expr: METRIC_ID
        data_type: TEXT
        comment: "Unique identifier for each crane metric reading."
      - name: TERMINAL_ID
        expr: TERMINAL_ID
        data_type: TEXT
        comment: "Foreign key to TERMINALS table."
      - name: CRANE_ID
        expr: CRANE_ID
        data_type: TEXT
        comment: "Unique identifier for the specific crane."
      - name: TIMESTAMP
        expr: TIMESTAMP
        data_type: TIMESTAMP_NTZ
        comment: "Date and time of the metric reading."
        synonyms:
          - "reading time"
          - "measurement time"
      - name: STATUS
        expr: STATUS
        data_type: TEXT
        comment: "Operational status of the crane."
        synonyms:
          - "crane status"
      - name: OPERATOR_SHIFT
        expr: OPERATOR_SHIFT
        data_type: TEXT
        comment: "Shift during which the reading was taken."
        synonyms:
          - "shift"
          - "work shift"
          - "time of day"
    facts:
      - name: MOVES_PER_HOUR
        expr: MOVES_PER_HOUR
        data_type: NUMBER
        comment: "Container moves per hour - key crane productivity metric."
        synonyms:
          - "crane speed"
          - "lift rate"
      - name: UTILIZATION_PCT
        expr: UTILIZATION_PCT
        data_type: NUMBER
        comment: "Percentage of time the crane was actively working."
        synonyms:
          - "utilization"
          - "usage percent"
          - "crane utilization"
      - name: IDLE_TIME_MINUTES
        expr: IDLE_TIME_MINUTES
        data_type: NUMBER
        comment: "Minutes the crane was idle."
      - name: CONTAINER_LIFTS
        expr: CONTAINER_LIFTS
        data_type: NUMBER
        comment: "Total container lifts during the period."

  - name: TRUCK_QUEUE_TIMES
    base_table:
      database: PORT_YTO_AI
      schema: PORT_OPS
      table: TRUCK_QUEUE_TIMES
    comment: "Time-series measurements of truck queues and wait times at terminal gates."
    dimensions:
      - name: QUEUE_ID
        expr: QUEUE_ID
        data_type: TEXT
        comment: "Unique identifier for each queue measurement."
      - name: TERMINAL_ID
        expr: TERMINAL_ID
        data_type: TEXT
        comment: "Foreign key to TERMINALS table."
      - name: TIMESTAMP
        expr: TIMESTAMP
        data_type: TIMESTAMP_NTZ
        comment: "Date and time of the queue measurement."
        synonyms:
          - "measurement time"
          - "reading time"
      - name: WEATHER_CONDITION
        expr: WEATHER_CONDITION
        data_type: TEXT
        comment: "Weather conditions at measurement time."
        synonyms:
          - "weather"
          - "conditions"
      - name: IS_PEAK_HOUR
        expr: IS_PEAK_HOUR
        data_type: BOOLEAN
        comment: "Whether measured during a peak traffic hour."
        synonyms:
          - "peak hour"
          - "rush hour"
          - "busy period"
    facts:
      - name: TRUCKS_IN_QUEUE
        expr: TRUCKS_IN_QUEUE
        data_type: NUMBER
        comment: "Number of trucks waiting in the queue."
        synonyms:
          - "queue length"
          - "trucks waiting"
          - "queue size"
      - name: AVG_WAIT_MINUTES
        expr: AVG_WAIT_MINUTES
        data_type: NUMBER
        comment: "Average wait time in minutes."
        synonyms:
          - "wait time"
          - "average wait"
          - "queue time"
      - name: MAX_WAIT_MINUTES
        expr: MAX_WAIT_MINUTES
        data_type: NUMBER
        comment: "Maximum wait time in minutes."
      - name: GATE_LANES_OPEN
        expr: GATE_LANES_OPEN
        data_type: NUMBER
        comment: "Number of gate lanes open."

relationships:
  - name: MANIFESTS_TO_TERMINALS
    left_table: CONTAINER_MANIFESTS
    right_table: TERMINALS
    relationship_type: many_to_one
    join_columns:
      - left_column: DESTINATION_TERMINAL
        right_column: TERMINAL_ID

  - name: MANIFESTS_TO_VESSELS
    left_table: CONTAINER_MANIFESTS
    right_table: VESSELS
    relationship_type: many_to_one
    join_columns:
      - left_column: VESSEL_ID
        right_column: VESSEL_ID

  - name: INVOICES_TO_MANIFESTS
    left_table: CARGO_INVOICES
    right_table: CONTAINER_MANIFESTS
    relationship_type: many_to_one
    join_columns:
      - left_column: MANIFEST_ID
        right_column: MANIFEST_ID

  - name: CRANES_TO_TERMINALS
    left_table: CRANE_UTILIZATION
    right_table: TERMINALS
    relationship_type: many_to_one
    join_columns:
      - left_column: TERMINAL_ID
        right_column: TERMINAL_ID

  - name: TRUCKS_TO_TERMINALS
    left_table: TRUCK_QUEUE_TIMES
    right_table: TERMINALS
    relationship_type: many_to_one
    join_columns:
      - left_column: TERMINAL_ID
        right_column: TERMINAL_ID

metrics:
  - name: TOTAL_TEU
    expr: SUM(CONTAINER_MANIFESTS.TEU_COUNT)
    data_type: NUMBER
    comment: "Total Twenty-foot Equivalent Units - primary volume measure."
    synonyms:
      - "total container volume"
      - "TEU volume"

  - name: TOTAL_CONTAINERS
    expr: SUM(CONTAINER_MANIFESTS.CONTAINER_COUNT)
    data_type: NUMBER
    comment: "Total number of containers across all manifests."
    synonyms:
      - "container count"
      - "total boxes"

  - name: AVERAGE_BERTH_TIME
    expr: AVG(CONTAINER_MANIFESTS.ACTUAL_BERTH_TIME_HOURS)
    data_type: NUMBER
    comment: "Average actual berth time in hours."
    synonyms:
      - "avg berth time"
      - "mean berth duration"

  - name: TOTAL_TRADE_VALUE
    expr: SUM(CARGO_INVOICES.TOTAL_VALUE_CAD)
    data_type: NUMBER
    comment: "Total trade value in Canadian dollars."
    synonyms:
      - "total invoice value"
      - "total cargo value"
      - "trade volume CAD"

  - name: SHIPMENT_COUNT
    expr: COUNT(DISTINCT CONTAINER_MANIFESTS.MANIFEST_ID)
    data_type: NUMBER
    comment: "Total number of distinct shipments processed."
    synonyms:
      - "number of shipments"
      - "manifest count"

  - name: AVERAGE_CRANE_UTILIZATION
    expr: AVG(CRANE_UTILIZATION.UTILIZATION_PCT)
    data_type: NUMBER
    comment: "Average crane utilization percentage."
    synonyms:
      - "avg crane usage"
      - "mean utilization"

  - name: AVERAGE_TRUCK_WAIT_TIME
    expr: AVG(TRUCK_QUEUE_TIMES.AVG_WAIT_MINUTES)
    data_type: NUMBER
    comment: "Average truck wait time in minutes."
    synonyms:
      - "avg wait time"
      - "mean queue time"
      - "average queue wait"

ai_sql_generation:
  instructions:
    - "This semantic view covers Port of Toronto operations on Lake Ontario. The port is a critical Great Lakes shipping hub for bulk and containerized cargo entering Canada."
    - "CBSA stands for Canada Border Services Agency - it handles customs declarations and inspections for all cargo entering Canada."
    - "Peak shipping season on the Great Lakes is June through October. The St. Lawrence Seaway typically closes in late December and reopens in late March."
    - "Key port terminals are: Terminal 51, Cherry Street, Port Lands, Outer Harbour, and Commissioners Street."
    - "TEU (Twenty-foot Equivalent Unit) is the standard measure for container shipping volume. A standard 40-foot container equals 2 TEU."
    - "When users ask about throughput or volume, use TEU_COUNT or CONTAINER_COUNT from CONTAINER_MANIFESTS."
    - "When users ask about trade value or revenue, use TOTAL_VALUE_CAD from CARGO_INVOICES or DECLARED_VALUE_CAD from CONTAINER_MANIFESTS."
    - "When users ask about crane performance or productivity, use MOVES_PER_HOUR or UTILIZATION_PCT from CRANE_UTILIZATION."
    - "When users ask about congestion or delays, check TRUCK_QUEUE_TIMES for gate congestion and RAIL_SCHEDULES for rail delays."
    - "Support English language queries. Interpret dock or berth as terminal, carrier as shipping_line, goods type as cargo_category."
